apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: homework-netpol
  namespace: homework
spec:
  podSelector: {} # Применяется ко всем Pod в namespace homework
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Разрешаю Ingress Controller (из namespace ingress-nginx) обращаться к frontend (80) и backend (8080)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 8080
  
  # Разрешаю Frontend обращаться к Backend (внутренняя связь)
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    ports:
    - protocol: TCP
      port: 8080

  # Разрешаю Backend обращаться к PostgreSQL
  - from:
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 5432

  egress:
  # Разрешаю всем подам ходить в DNS (CoreDNS)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # Разрешаю Backend инициировать соединение с PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
